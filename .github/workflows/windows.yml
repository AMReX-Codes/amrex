name: windows

on: [push, pull_request]

jobs:
  # Build libamrex and all tests
  tests_msvc:
    name: MSVC C++17 w/o Fortran w/o MPI
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - name: Build & Install
      run: |
        cmake -S . -B build   `
              -DCMAKE_BUILD_TYPE=Debug      `
              -DBUILD_SHARED_LIBS=ON        `
              -DCMAKE_VERBOSE_MAKEFILE=ON   `
              -DAMReX_ENABLE_TESTS=ON       `
              -DAMReX_FORTRAN=OFF           `
              -DAMReX_MPI=OFF               `
              -DAMReX_PARTICLES=ON
        cmake --build build --config Debug -j 2

  # Build libamrex and all test (static)
  test_msvc_static:
    name: MSVC C++17 w/o Fortran w/o MPI static
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - name: Build & Install
      run: |
        cmake -S . -B build   `
              -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_VERBOSE_MAKEFILE=ON   `
              -DAMReX_ENABLE_TESTS=ON    `
              -DAMReX_FORTRAN=OFF           `
              -DAMReX_MPI=OFF               `
              -DAMReX_PARTICLES=ON
        cmake --build build --config RelWithDebInfo -j 2

  # Build libamrex and all tests
  tests_clang:
    name: Clang C++17 w/o Fortran w/o MPI
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - uses: seanmiddleditch/gha-setup-ninja@master
    - name: Build & Install
      shell: cmd
      run: |
        call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\vc\Auxiliary\build\vcvarsall.bat" x64
        cmake -S . -B build   ^
              -T "ClangCl"    ^
              -DCMAKE_BUILD_TYPE=Release    ^
              -DBUILD_SHARED_LIBS=ON        ^
              -DCMAKE_VERBOSE_MAKEFILE=ON   ^
              -DAMReX_ENABLE_TESTS=ON       ^
              -DAMReX_FORTRAN=OFF           ^
              -DAMReX_MPI=OFF               ^
              -DAMReX_OMP=ON                ^
              -DAMReX_PARTICLES=ON
        cmake --build build --config Release -j 2

  # Build libamrex and all tutorials with CUDA
  tutorials-cuda:
    name: MSVC C++17 w/ CUDA@11.1.1 w/o Fortran w/o MPI
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v2
    - uses: seanmiddleditch/gha-setup-ninja@master
    - name: Windows CUDA Cache
      uses: actions/cache@v2
      with:
        path: "C:/Program Files/NVIDIA GPU Computing Toolkit/"
        key: msvc_cxx17_cuda111
    - name: Download CUDA
      run: |
        if (Test-Path "C:\Program Files\NVIDIA GPU Computing Toolkit\") { exit }
        New-item -ItemType directory -Name cuda
        Set-Location -Path cuda -PassThru
        Invoke-WebRequest -Uri 'https://developer.download.nvidia.com/compute/cuda/11.1.1/network_installers/cuda_11.1.1_win10_network.exe' -OutFile 'cuda_install.exe'
        Start-Process -FilePath '.\cuda_install.exe' -ArgumentList '-s' -Wait -NoNewWindow
    - name: Build & Install
      shell: cmd
      run: |
        call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\vc\Auxiliary\build\vcvarsall.bat" x64
        SET "PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.1\bin\;%PATH%"
        cmake -S . -B build ^
              -G Ninja      ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DAMReX_FORTRAN=OFF        ^
              -DAMReX_MPI=OFF            ^
              -DAMReX_GPU_BACKEND=CUDA   ^
              -DCMAKE_CXX_STANDARD=17    ^
              -DCMAKE_CUDA_STANDARD=17   ^
              -DAMReX_CUDA_ARCH=6.0
        cmake --build build -j 2
    # use "cmd", see https://gitlab.kitware.com/cmake/cmake/-/issues/20281
    # -DAMReX_PARTICLES=ON
